name: Build and publish Docker image

# Publishes a multi-arch (amd64 + arm64) image to GitHub Container Registry.
#   - push to main      → :edge        (latest dev build)
#   - push tag vX.Y.Z   → :X.Y.Z, :X.Y, :latest
# After the first run, make the package public once at
#   github.com/users/<owner>/packages/container/newsflow-bot/settings
# so users can `docker pull` without authenticating.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Don't run overlapping builds for the same ref.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        # GHCR requires a lowercase image path; the repo owner may be mixed-case.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # latest=auto → :latest is applied to the newest semver tag only,
          # never to plain main pushes (those get :edge).
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-arch-per-platform manifest, no attestation entries — keeps the
          # GHCR package showing just amd64/arm64 (no "unknown/unknown").
          provenance: false
