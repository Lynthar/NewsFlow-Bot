name: Tests

# Quality gate for every push and PR. The Docker image publish
# (docker-publish.yml) runs independently; this is what tells you a
# change is actually safe to ship.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The supported range's endpoints (3.14 blocked on lxml wheels).
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project with all extras + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install "pytest>=7.4,<8" "pytest-asyncio>=0.23,<0.24"

      - name: Run tests
        run: pytest tests/ -v

  # ruff (check + format) is a hard gate now — the tree is clean and stays
  # that way. mypy stays informational (continue-on-error): ~154 strict-mode
  # findings (mostly Optional narrowing in the Telegram adapter) are their own
  # cleanup; flip mypy to blocking once that lands.
  lint:
    name: ruff (blocking) + mypy (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install "ruff>=0.1,<0.2" "mypy>=1.8,<2"

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy
        continue-on-error: true
        run: mypy src/
