name: Tests

# Quality gate for every push and PR. The Docker image publish
# (docker-publish.yml) runs independently; this is what tells you a
# change is actually safe to ship.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The supported range's endpoints (3.14 blocked on lxml wheels).
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project with all extras + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install "pytest>=9.0.3,<10" "pytest-asyncio>=1.4,<2"

      - name: Run tests
        run: pytest tests/ -v

  # ruff (check + format) and mypy (strict) are all hard gates now — the
  # tree is clean and stays that way. Keep new code lint- and type-clean.
  lint:
    name: ruff + mypy (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install "ruff>=0.1,<0.2" "mypy>=1.8,<2"

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy
        run: mypy src/
