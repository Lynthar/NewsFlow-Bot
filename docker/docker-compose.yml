# NewsFlow Bot - Docker Compose Configuration
#
# Usage:
#   1. Copy ../.env.example to ../.env and configure your tokens
#   2. Run: docker-compose up -d
#   3. View logs: docker-compose logs -f newsflow
#   4. Stop: docker-compose down
#
# For production with Redis:
#   docker-compose --profile with-redis up -d

services:
  # ============================================
  # Main Application
  # ============================================
  newsflow:
    # Pulls the prebuilt multi-arch image from GHCR by default — no local build.
    # To run a locally-built image instead:
    #   make docker-build      # builds newsflow-bot:latest
    #   NEWSFLOW_IMAGE=newsflow-bot:latest docker compose -f docker/docker-compose.yml up -d
    image: ${NEWSFLOW_IMAGE:-ghcr.io/lynthar/newsflow-bot:latest}
    container_name: newsflow-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/newsflow.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_ENABLED=${API_ENABLED:-false}
      - API_PORT=8000
      # webhooks.yaml / sources.yaml are read from the host-mounted ./config dir
      # (see volumes), so they're editable on the host. The bot reconciles them
      # on every start.
      - WEBHOOKS_CONFIG_PATH=/app/config/webhooks.yaml
      - SOURCES_CONFIG_PATH=/app/config/sources.yaml
    volumes:
      # Persistent app state (the SQLite DB), managed by Docker.
      - newsflow-data:/app/data
      # Your declarative config, edited on the host and mounted read-only — the
      # bot only ever reads these. Put webhooks.yaml / sources.yaml in ./config/
      # to enable those features (file absent = feature off).
      - ../config:/app/config:ro
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - newsflow-network
    # Use public DNS resolvers instead of whatever the host hands the
    # container. Some VPS providers hand out 127.0.0.53 (systemd-resolved
    # stub on host) which doesn't exist inside the container, breaking all
    # outbound name resolution.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Healthcheck is defined in the Dockerfile (heartbeat file mtime).

  # ============================================
  # Redis Cache (Optional)
  # ============================================
  # Enable with: docker-compose --profile with-redis up -d
  redis:
    image: redis:7-alpine
    container_name: newsflow-redis
    profiles:
      - with-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - newsflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # PostgreSQL Database (Optional)
  # ============================================
  # Enable with: docker-compose --profile with-postgres up -d
  postgres:
    image: postgres:15-alpine
    container_name: newsflow-postgres
    profiles:
      - with-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-newsflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-newsflow}
      - POSTGRES_DB=${POSTGRES_DB:-newsflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - newsflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsflow}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  newsflow-network:
    driver: bridge

volumes:
  newsflow-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
